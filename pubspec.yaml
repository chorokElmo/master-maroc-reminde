name: master_maroc_reminder
description: "Master Maroc Reminder — discover Master's programs in Morocco, track deadlines, never miss an application."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & DI (Riverpod providers double as the app's DI graph)
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking & scraping
  dio: ^5.7.0
  html: ^0.15.5

  # Code generation / immutable models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local storage (offline-first cache: masters, favorites, documents, tracker)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5

  # Firebase (FlutterFire-ready; inert until `flutterfire configure` is run)
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.6

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^2.0.1

  # Calendar
  table_calendar: ^3.1.3

  # Premium UI
  # Pinned: 1.8.0+ calls Color.toARGB32(), which requires a newer Flutter
  # SDK than 3.27.1 (installed here).
  dynamic_color: 1.7.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_slidable: ^3.1.2
  share_plus: ^10.1.3
  connectivity_plus: ^6.1.1
  file_picker: ^8.1.6
  image_picker: ^1.1.2
  package_info_plus: ^8.1.2
  pdf: ^3.11.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
