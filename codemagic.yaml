workflows:
  ios-unsigned:
    name: iOS unsigned build (for Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build unsigned iOS app
        script: |
          flutter build ios --release --no-codesign
      - name: Package as .ipa for Sideloadly
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r MasterMarocReminder.ipa Payload
    artifacts:
      - build/ios/ipa/MasterMarocReminder.ipa
